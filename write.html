<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel = "stylesheet" href = "css/story.css">
    <link rel = "stylesheet" href = "css/setting.css">
    <title>title</title>
</head>
<body>
    <!-- 기본적으로 떠있어야 함 -->
    <div class = "write-container">
        <!-- 헤더 부분 -->
        <div class = "name">
            <img src = "images/char1.png">
            <span>이름</span>
        </div>

        <!-- 내용 작성 부분 -->
        <textarea class = "write" placeholder="내용을 작성하세요."></textarea>
        
        <!-- 사진 및 동영상 첨부 버튼 -->
        <div class="file-section">
            <input type = "file" id = "file-upload" onchange = "handleFile(this)"  accept = ".jpg, .png, .jpeg, .gif" multiple style = "display : none;">
        
            <label for = "file-upload" class = "file-button"> 
                <span id = "plus" style = "display : block;"> + </span>
                
                <!-- 미리보기 -->

                <img src = "" id = "preview-image" alt = "미리보기" style = "display : none;">
            </label>
        </div>

        <button class = "complete-button">
            완료
        </button>
        
    </div>

    <script src = "js/story.js"></script>
    <script>
        // this 사용해서 자동으로 해당 맞추기
        // 태그 자체를 사용해서 this.input으로 만들기

        function handleFile(input) {
            const file = input.files[0];

            if(file){
                const label = input.nextElementSibling;
                const previewImg = label.querySelector('#preview-image');
                const plusIcon = label.querySelector('#plus');
                const reader = new FileReader();

                reader.onload = function(e) {
                    plusIcon.style.display = 'none';
                    previewImg.src = e.target.result;
                    previewImg.style.display = 'block';
                    console.log("인식");
                    // 클래스 구분으로 가능하지 않는가.
                    if(!label.classList.contains('has-image')) {
                        // 지금 내가 추가하려는 버튼
                        label.classList.add('has-image');
                        console.log("새버튼");
                        addNewButton();
                    }
                }
                reader.readAsDataURL(file);
            }
        }

        // 버튼 옆에 추가하기
        function addNewButton() {
            // 어디탭에 추가할지
            const fileSection = document.querySelector('.file-section');
            const uniqueID = `file-${Date.now()}`;
            
            const fileHTML = `
                <input type = "file" id = "${uniqueID}" onchange = "handleFile(this)" accept = ".jpg, .png, .jpeg, .gif" multiple style = "display : none;">
        
                <label for = "${uniqueID}" class = "file-button"> 
                    <span id = "plus" style = "display : block;"> + </span>
                    
                    <!-- 미리보기 -->
                    <img src = "" id = "preview-image" alt = "미리보기" style = "display : none;">
                </label>
            `;
            console.log("작동");
            fileSection.insertAdjacentHTML('beforeend', fileHTML);
        }

        
    </script>
        
    
</body>
</html>
