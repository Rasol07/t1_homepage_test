<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel = "stylesheet" href = "css/story.css">
    <link rel = "stylesheet" href = "css/setting.css">
    <title>엔닝 자캐 정리</title>
</head>
<body>

    <!-- nav바 -->
    <nav class="navbar navbar-expand-lg navbar-light nav-detail main-nav">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link active text-white page-not-use" aria-current="page" href="index.html">Home</a>
                </li>
                <li class="nav-item font">
                    <a class="nav-link active  text-white" aria-current="page" href="story.html">Story</a>
                </li>
                <li class="nav-item font">
                    <a class="nav-link active text-white page-not-use" aria-current="page" href="content.html">Content</a>
                </li>
            </ul>
            
            <div class="ms-auto d-flex">
                <a class="navbar-brand ms-2" href="#">
                    <i class="fa-regular fa-calendar"></i>
                </a>
                <a class="navbar-brand ms-2" href="#">
                    <i class="fa-regular fa-user"></i>
                </a>
            </div>
            </div>
        </div>
    </nav>

        <!-- 왼쪽 탭 -->
    <div class = "story-container">
        <div class = "item member-list" id="memberList">
        </div>

        <div id = "modalOverlay" class = "modal-overlay">
                <div class = "write-container">
                    <!-- 헤더 부분 -->
                    <div class = "name">
                        <img src = "images/char1.png">
                        <span>이름</span>
                    </div>

                    <!-- 내용 작성 부분 -->
                    <textarea class = "write" placeholder="내용을 작성하세요."></textarea>
                    
                    <!-- 사진 및 동영상 첨부 버튼 -->
                    <div class="file-section">
                        <input type = "file" id = "file-upload" onchange = "handleFile(this)"  accept = ".jpg, .png, .jpeg, .gif" multiple style = "display : none;">
                    
                        <label for = "file-upload" class = "file-button"> 
                            <span id = "plus" style = "display : block;"> + </span>
                            
                            <!-- 미리보기 -->

                            <img src = "" id = "preview-image" alt = "미리보기" style = "display : none;">
                        </label>
                    </div>

                    <button class = "complete-button">
                        완료
                    </button>
                    
                </div>
           </div>
        <!-- 오른쪽 탭 -->
        <div class = "item content-list" id = "contentList">
        </div>

        <div class = "up-button">
            <i class="fa-solid fa-arrow-up-long"></i>
        </div>
    </div>

    <footer>
        마감
    </footer>
    <script src = "https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src = "js/story.js"></script>
    <script src = "js/writeTab.js"></script>
    <script src = "js/upButton.js"></script>
</body>
</html>
